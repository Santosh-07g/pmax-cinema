<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* Page background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#7ea3c9,#0a3a78);
}

/* Form Card */

form{
width:350px;
padding:45px 35px;
border-radius:20px;
background: linear-gradient(135deg,#5f86b5,#0a3a78);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
text-align:center;
}

/* Title */

form h2{
color:white;
letter-spacing:3px;
font-weight:300;
margin-bottom:35px;
}

/* Inputs */

form input{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-bottom:1px solid rgba(255,255,255,0.6);
background:transparent;
color:white;
font-size:14px;
}

form input::placeholder{
color:rgba(255,255,255,0.7);
}

/* Button */

form button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#08366b;
color:white;
letter-spacing:2px;
font-weight:bold;
border-radius:3px;
cursor:pointer;
transition:0.3s;
}

form button:hover{
background:#062a54;
}

/* Error Message */

p{
margin-top:15px;
font-size:14px;
}
a{
    text-decoration: none;
    color: red;
    font-weight: bolder;
}

</style>

</head>

<body>

<form action="" method="post">
{% csrf_token %}
<h2>Signup Page</h2>

<input type="text" placeholder="Username" name="username" required><br>
<input type="text" placeholder="Email" name="email" required><br>
<input type="text" placeholder="Password" name="password" required><br>

<button>Signup</button>
<p>Already Have Account?
    <a href="{% url 'login' %}">Sign In</a></p>


</form>

{% if error %}
<p style="color:red;font-weight:bolder;">{{error}}</p>
{% endif %}

</body>
</html>
