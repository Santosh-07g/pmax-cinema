<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMAX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Raleway',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#1a2a4a,#2d4a7a,#1a3a6a,#0f2040);
background-attachment:fixed;
color:white;
}

/* Navbar */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
height:70px;
position:sticky;
top:0;
background:rgba(15,25,55,0.6);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:100;
}

.hh{
font-size:24px;
font-weight:700;
letter-spacing:5px;
}

/* Logout button */
.logout button{
padding:9px 22px;
background:rgba(229,9,20,0.15);
border:1px solid rgba(229,9,20,0.45);
color:white;
border-radius:8px;
font-size:13px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.logout button:hover{
background:#e50914;
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(229,9,20,0.4);
}

/* Welcome */
.welcome{
text-align:center;
padding:40px 20px 10px 20px;
}

.welcome h2{
font-size:32px;
font-weight:700;
margin-bottom:5px;
}

.welcome p{
opacity:0.8;
font-size:14px;
}

/* Search */
.searchBox{
display:flex;
justify-content:center;
margin:25px 0;
position:relative;
}

.searchBox input{
width:380px;
padding:13px 20px 13px 44px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
outline:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
font-family:'Raleway',sans-serif;
backdrop-filter:blur(10px);
transition:border 0.3s, box-shadow 0.3s;
}

.searchBox input:focus{
border-color:rgba(229,9,20,0.6);
box-shadow:0 0 0 3px rgba(229,9,20,0.1);
background:rgba(255,255,255,0.12);
}

.searchBox input::placeholder{
color:rgba(255,255,255,0.45);
}

.search-icon{
position:absolute;
left:calc(50% - 190px + 14px);
top:50%;
transform:translateY(-50%);
font-size:16px;
opacity:0.45;
pointer-events:none;
}

/* Stats */
.stats{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:40px;
flex-wrap:wrap;
}

.statCard{
background:rgba(255,255,255,0.08);
padding:20px 40px;
border-radius:12px;
text-align:center;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
transition:transform 0.3s;
min-width:140px;
}

.statCard:hover{
transform:translateY(-4px);
}

.statCard h3{
font-size:28px;
font-weight:700;
color:#ff4b4b;
}

.statCard p{
font-size:13px;
opacity:0.8;
margin-top:4px;
}

/* Section title */
.sectionTitle{
text-align:center;
font-size:24px;
margin-bottom:30px;
letter-spacing:0.05em;
}

/* Movie grid */
.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:0 30px 60px 30px;
}

/* Movie card */
.cards{
width:230px;
padding:16px;
border-radius:16px;
text-align:center;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
box-shadow:0 8px 32px rgba(0,0,0,0.35);
transition:0.35s;
animation:fadeIn 0.4s ease both;
}

.cards:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 18px 45px rgba(0,0,0,0.6);
}

.cards img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

.cards h2{
font-size:13px;
font-weight:500;
margin:4px 0;
}

.cards button{
margin-top:12px;
width:100%;
padding:10px;
border:1px solid rgba(229,9,20,0.45);
background:rgba(229,9,20,0.15);
color:white;
font-size:13px;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:0.3s;
font-family:'Raleway',sans-serif;
}

.cards button:hover{
background:#e50914;
border-color:#e50914;
box-shadow:0 6px 18px rgba(229,9,20,0.4);
}

/* No results */
#no-result{
display:none;
color:rgba(255,255,255,0.45);
font-size:15px;
text-align:center;
width:100%;
padding:60px 20px;
letter-spacing:0.05em;
line-height:2;
}

#no-result span{
color:rgba(229,9,20,0.8);
font-weight:600;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(16px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="top">
    <h1 class="hh">PMAX</h1>
    <div class="logout">
        <a href="{% url 'home' %}">
            <button>Logout</button>
        </a>
    </div>
</div>

<!-- Welcome -->
<div class="welcome">
    <h2>Welcome to PMAX 🎬</h2>
    <p>Discover movies and book your favorite shows.</p>
</div>

<!-- Search -->
<div class="searchBox">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies...">
</div>

<!-- Hidden data bridge — passes Django values to JS without linter errors -->
<span id="django-data"
    data-movies="{{ movies|length }}"
    data-shows="{{ shows_today }}"
    data-bookings="{{ total_bookings }}"
    style="display:none;">
</span>

<!-- Stats -->
<div class="stats">
    <div class="statCard">
        <h3 id="stat-movies">0</h3>
        <p>Total Movies</p>
    </div>
    <div class="statCard">
        <h3 id="stat-shows">0</h3>
        <p>Total Shows</p>
    </div>
    <div class="statCard">
        <h3 id="stat-bookings">0</h3>
        <p>Total Bookings</p>
    </div>
</div>

<h2 class="sectionTitle">Now Showing</h2>

<!-- Movies -->
<div class="container" id="movieContainer">

    {% for i in movies %}
    <div class="cards" data-title="{{ i.name|lower }}">
        <img src="{{ i.image.url }}" alt="{{ i.name }}">
        <h2>Title: {{ i.name }}</h2>
        <h2>Duration: {{ i.duration }} mins</h2>
        <a href="{% url 'movie_detail' i.id %}">
            <button>View</button>
        </a>
    </div>
    {% endfor %}

    <!-- No results message -->
    <p id="no-result">
        🎬 No movies found for "<span id="search-term"></span>"<br>
        <small style="font-size:12px;opacity:0.6;">Try searching with a different name</small>
    </p>

</div>

<script>
    // ── Read Django values safely via data attributes ──
    var djangoData    = document.getElementById('django-data');
    var totalMovies   = parseInt(djangoData.getAttribute('data-movies'))   || 0;
    var totalShows    = parseInt(djangoData.getAttribute('data-shows'))    || 0;
    var totalBookings = parseInt(djangoData.getAttribute('data-bookings')) || 0;

    // ── Animated count-up ──
    function animateCount(elementId, target, duration) {
        var el = document.getElementById(elementId);
        if (!el) return;
        var startTime = null;

        function update(currentTime) {
            if (!startTime) startTime = currentTime;
            var elapsed  = currentTime - startTime;
            var progress = Math.min(elapsed / duration, 1);
            var eased    = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.floor(eased * target);
            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                el.textContent = target;
            }
        }
        requestAnimationFrame(update);
    }

    window.addEventListener('DOMContentLoaded', function() {
        animateCount('stat-movies',   totalMovies,   1000);
        animateCount('stat-shows',    totalShows,    1200);
        animateCount('stat-bookings', totalBookings, 1400);
    });

    // ── Search filter ──
    var searchInput = document.getElementById('searchInput');
    var cards       = document.querySelectorAll('.cards');
    var noResult    = document.getElementById('no-result');
    var searchTerm  = document.getElementById('search-term');

    searchInput.addEventListener('input', function() {
        var query = this.value.toLowerCase().trim();
        searchTerm.textContent = this.value;
        var visibleCount = 0;

        cards.forEach(function(card) {
            var title = card.getAttribute('data-title') || '';
            if (title.includes(query)) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        noResult.style.display = visibleCount === 0 ? 'block' : 'none';
    });
</script>

</body>
</html>
