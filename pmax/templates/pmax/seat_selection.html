<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(135deg, #1a2a4a 0%, #2d4a7a 40%, #1a3a6a 70%, #0f2040 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
        }

        /* ── NAVBAR (added) ── */
        .nav {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            padding: 0 60px;
            background: rgba(15, 25, 55, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            animation: fadeDown 0.5s ease both;
        }

        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: white;
        }

        .nav-btn {
            background: rgba(229, 9, 20, 0.15);
            border: 1px solid rgba(229, 9, 20, 0.45);
            padding: 9px 22px;
            color: white;
            border-radius: 8px;
            letter-spacing: 0.08em;
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
        }

        .nav-btn:hover {
            background: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(229, 9, 20, 0.4);
        }

        /* ── PAGE CONTENT ── */
        .page-wrap {
            padding: 40px 24px 80px;
        }

        h2 {
            letter-spacing: 0.06em;
            font-size: 1rem;
            color: rgba(200, 215, 255, 0.75);
            margin-bottom: 5px;
            font-weight: 400;
            animation: fadeDown 0.6s ease both;
        }
        h2:nth-of-type(1) {
            font-size: 1.8rem; font-weight: 700; color: white;
            letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
            animation-delay: 0s;
        }
        h2:nth-of-type(2) { animation-delay: 0.08s; }
        h2:nth-of-type(3) { animation-delay: 0.13s; }
        h2:nth-of-type(4) {
            animation-delay: 0.18s; color: #f5c518;
            font-weight: 600; margin-bottom: 32px;
        }

        .theater-box {
            position: relative;
            max-width: 780px;
            margin: 0 auto 36px;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        .theater-shell {
            background: #0d0d0d;
            border-radius: 12px 12px 40px 40px;
            padding: 0 0 32px;
            border: 2px solid #222;
            box-shadow:
                0 0 0 6px #111,
                0 0 0 8px #1a1a1a,
                0 30px 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .screen-wall {
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            padding: 18px 40px 0;
            text-align: center;
            border-bottom: 3px solid #222;
        }

        .screen-glow {
            width: 85%;
            margin: 0 auto;
            height: 10px;
            background: linear-gradient(90deg, transparent 0%, #fff9e6 20%, #fffbe8 50%, #fff9e6 80%, transparent 100%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            box-shadow:
                0 -2px 30px 6px rgba(255,248,200,0.55),
                0 0 60px 20px rgba(255,240,150,0.2);
            margin-bottom: 0;
        }

        .screen-label {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            color: rgba(255,255,255,0.25);
            padding: 8px 0 14px;
            text-transform: uppercase;
        }

        .theater-inner {
            position: relative;
            padding: 24px 28px 10px;
        }

        .theater-inner::before,
        .theater-inner::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 18px;
            background: repeating-linear-gradient(
                180deg,
                #1a1a1a 0px, #1a1a1a 8px,
                #141414 8px, #141414 16px
            );
            border: 1px solid #222;
        }
        .theater-inner::before { left: 0; border-radius: 0 0 0 8px; }
        .theater-inner::after  { right: 0; border-radius: 0 0 8px 0; }

        .theater-floor {
            height: 22px;
            background: repeating-linear-gradient(
                90deg,
                #1a0a0a 0px, #1a0a0a 10px,
                #200e0e 10px, #200e0e 20px
            );
            border-top: 2px solid #2a1010;
            margin: 0 18px;
            border-radius: 0 0 8px 8px;
        }

        .seatArea {
            display: flex;
            flex-wrap: wrap;
            gap: 18px 12px;
            justify-content: center;
            font-weight: 700;
        }

        .seatArea div {
            position: relative;
            width: 46px;
            height: 50px;
            cursor: pointer;
            animation: seatEntrance 0.4s ease both;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.25s ease;
        }

        .seatArea div .s-back {
            position: absolute;
            top: 0;
            left: 4px;
            right: 4px;
            height: 28px;
            background: linear-gradient(160deg, #1e4d8c, #163a6e);
            border: 1.5px solid #2d6abf;
            border-radius: 8px 8px 2px 2px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 2px 6px rgba(0,0,0,0.5);
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        .seatArea div .s-back::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 7px;
            background: linear-gradient(160deg, #2558a8, #1a4a8a);
            border: 1.5px solid #2d6abf;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            transition: background 0.25s, border-color 0.25s;
        }

        .seatArea div .s-back::after {
            content: attr(data-label);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.58rem;
            font-weight: 700;
            color: rgba(180, 210, 255, 0.9);
            font-family: 'Raleway', sans-serif;
            letter-spacing: 0.02em;
        }

        .seatArea div .s-left {
            position: absolute;
            bottom: 14px;
            left: 0;
            width: 5px;
            height: 18px;
            background: linear-gradient(180deg, #1a4070, #122d55);
            border: 1px solid #1e4a85;
            border-radius: 3px 0 0 3px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.08);
            transition: background 0.25s, border-color 0.25s;
        }

        .seatArea div .s-right {
            position: absolute;
            bottom: 14px;
            right: 0;
            width: 5px;
            height: 18px;
            background: linear-gradient(180deg, #1a4070, #122d55);
            border: 1px solid #1e4a85;
            border-radius: 0 3px 3px 0;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.08);
            transition: background 0.25s, border-color 0.25s;
        }

        .seatArea div .s-seat {
            position: absolute;
            bottom: 0;
            left: 4px;
            right: 4px;
            height: 18px;
            background: linear-gradient(180deg, #1e5299, #14387a);
            border: 1.5px solid #2d6abf;
            border-radius: 3px 3px 6px 6px;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.5);
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        .seatArea div .s-seat::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 15%;
            right: 15%;
            height: 1px;
            background: rgba(255,255,255,0.08);
            border-radius: 1px;
        }

        .seatArea div:hover:not(.booked) {
            transform: translateY(-6px) scale(1.12);
            filter: drop-shadow(0 8px 12px rgba(59,130,246,0.6));
            z-index: 2;
        }
        .seatArea div:hover:not(.booked) .s-back {
            background: linear-gradient(160deg, #2563eb, #1d4ed8);
            border-color: #60a5fa;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), 0 2px 8px rgba(37,99,235,0.5);
        }
        .seatArea div:hover:not(.booked) .s-back::before {
            background: linear-gradient(160deg, #3b82f6, #2563eb);
            border-color: #60a5fa;
        }
        .seatArea div:hover:not(.booked) .s-seat {
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-color: #60a5fa;
        }
        .seatArea div:hover:not(.booked) .s-left,
        .seatArea div:hover:not(.booked) .s-right {
            background: linear-gradient(180deg, #2563eb, #1d4ed8);
            border-color: #60a5fa;
        }

        .seatArea div.selected {
            transform: translateY(-4px) scale(1.08);
            animation: seatPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            filter: drop-shadow(0 0 12px rgba(74,222,128,0.8));
        }
        .seatArea div.selected .s-back {
            background: linear-gradient(160deg, #16a34a, #15803d);
            border-color: #4ade80;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), 0 2px 8px rgba(22,163,74,0.5);
        }
        .seatArea div.selected .s-back::before {
            background: linear-gradient(160deg, #22c55e, #16a34a);
            border-color: #4ade80;
        }
        .seatArea div.selected .s-seat {
            background: linear-gradient(180deg, #22c55e, #15803d);
            border-color: #4ade80;
        }
        .seatArea div.selected .s-left,
        .seatArea div.selected .s-right {
            background: linear-gradient(180deg, #16a34a, #14532d);
            border-color: #4ade80;
        }

        .seatArea div.booked {
            cursor: not-allowed;
            filter: drop-shadow(0 2px 4px rgba(239,68,68,0.3));
        }
        .seatArea div.booked .s-back {
            background: linear-gradient(160deg, #7f1d1d, #5a1212);
            border-color: #ef4444;
        }
        .seatArea div.booked .s-back::before {
            background: linear-gradient(160deg, #991b1b, #7f1d1d);
            border-color: #ef4444;
        }
        .seatArea div.booked .s-back::after {
            content: '✕';
            color: #ef4444;
            font-size: 0.75rem;
        }
        .seatArea div.booked .s-seat {
            background: linear-gradient(180deg, #991b1b, #7f1d1d);
            border-color: #ef4444;
        }
        .seatArea div.booked .s-left,
        .seatArea div.booked .s-right {
            background: linear-gradient(180deg, #7f1d1d, #5a1212);
            border-color: #ef4444;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.3s ease both;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: rgba(200,215,255,0.65);
            letter-spacing: 0.05em;
        }
        .legend-seat {
            position: relative;
            width: 20px;
            height: 22px;
            flex-shrink: 0;
        }
        .legend-seat::before {
            content: '';
            position: absolute;
            top: 0; left: 2px; right: 2px;
            height: 13px;
            border-radius: 4px 4px 1px 1px;
            border: 1.5px solid;
        }
        .legend-seat::after {
            content: '';
            position: absolute;
            bottom: 0; left: 2px; right: 2px;
            height: 8px;
            border-radius: 2px 2px 4px 4px;
            border: 1.5px solid;
        }
        .legend-seat.available::before { background: linear-gradient(160deg,#1e4d8c,#163a6e); border-color: #2d6abf; }
        .legend-seat.available::after  { background: linear-gradient(180deg,#1e5299,#14387a); border-color: #2d6abf; }
        .legend-seat.selected::before  { background: linear-gradient(160deg,#16a34a,#15803d); border-color: #4ade80; }
        .legend-seat.selected::after   { background: linear-gradient(180deg,#22c55e,#15803d); border-color: #4ade80; }
        .legend-seat.booked::before    { background: linear-gradient(160deg,#7f1d1d,#5a1212); border-color: #ef4444; }
        .legend-seat.booked::after     { background: linear-gradient(180deg,#991b1b,#7f1d1d); border-color: #ef4444; }

        button {
            background: rgba(229, 9, 20, 0.15);
            border: 1px solid rgba(229, 9, 20, 0.45);
            color: white;
            padding: 13px 36px;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            display: block;
            margin-top: 16px;
            backdrop-filter: blur(6px);
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
            animation: fadeUp 0.6s 0.4s ease both;
        }
        button:hover {
            background: #e50914;
            border-color: #e50914;
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(229, 9, 20, 0.4);
        }
        button:active { transform: scale(0.97); }

        .seatArea div:nth-child(1)    { animation-delay: 0.04s; }
        .seatArea div:nth-child(2)    { animation-delay: 0.07s; }
        .seatArea div:nth-child(3)    { animation-delay: 0.10s; }
        .seatArea div:nth-child(4)    { animation-delay: 0.13s; }
        .seatArea div:nth-child(5)    { animation-delay: 0.16s; }
        .seatArea div:nth-child(6)    { animation-delay: 0.19s; }
        .seatArea div:nth-child(7)    { animation-delay: 0.22s; }
        .seatArea div:nth-child(8)    { animation-delay: 0.25s; }
        .seatArea div:nth-child(9)    { animation-delay: 0.28s; }
        .seatArea div:nth-child(10)   { animation-delay: 0.31s; }
        .seatArea div:nth-child(11)   { animation-delay: 0.34s; }
        .seatArea div:nth-child(12)   { animation-delay: 0.37s; }
        .seatArea div:nth-child(n+13) { animation-delay: 0.40s; }

        @keyframes seatEntrance {
            from { opacity: 0; transform: scale(0.4) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes seatPop {
            0%   { transform: translateY(-4px) scale(0.85); }
            60%  { transform: translateY(-7px) scale(1.16); }
            100% { transform: translateY(-4px) scale(1.08); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ── NAVBAR (added) ── -->
    <div class="nav">
        <span class="nav-brand">PMAX</span>
        <button class="nav-btn" onclick="history.back()">← Back</button>
    </div>

    <div class="page-wrap">

    <h2>{{show.movie.name}}-{{show.theater.name}}</h2>
    <h2>Show Time: {{show.show_time}}</h2>
    <h2>Available_seats: {{show.available_seats}}</h2>
    <h2>Price : {{show.price}}</h2>

    <form action="" method="post">
        {% csrf_token %}

        <div class="theater-box">
            <div class="theater-shell">
                <div class="screen-wall">
                    <div class="screen-glow"></div>
                    <div class="screen-label">Screen</div>
                </div>
                <div class="theater-inner">
                    <div class="seatArea">
                        {% for seat in seats %}
                        <div id="{{seat}}"
                             class="{{seat}} {% if seat in booked_seats %}booked{% endif %}"
                             onclick="selectedSeat('{{seat}}')">
                            <div class="s-back" data-label="{{seat}}"></div>
                            <div class="s-left"></div>
                            <div class="s-right"></div>
                            <div class="s-seat"></div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="theater-floor"></div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-seat available"></div> Available</div>
            <div class="legend-item"><div class="legend-seat selected"></div> Selected</div>
            <div class="legend-item"><div class="legend-seat booked"></div> Booked</div>
        </div>

        <input type="hidden" name="selected_seats" id="selectedSeats"><br>
        <button>Confirm Booking</button>

    </form>

    </div>

    <script>
        let selected=[]
        function selectedSeat(id){
            let seat=document.getElementById(id)
            if (seat.classList.contains('booked')) return
            seat.classList.toggle('selected')
            if(seat.classList.contains('selected')){
                selected.push(id)
            }else{
                selected=selected.filter(s=>s!=id)
            }
            document.getElementById('selectedSeats').value=selected.join(',')
        }
    </script>
</body>
</html>
